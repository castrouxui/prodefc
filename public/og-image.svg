<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent circle decoration -->
  <circle cx="1050" cy="100" r="280" fill="#C8F000" opacity="0.07"/>
  <circle cx="150" cy="530" r="200" fill="#C8F000" opacity="0.05"/>

  <!-- Logo -->
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="120" font-weight="800"
        letter-spacing="-4" text-anchor="middle" fill="#ffffff">
    Prode<tspan fill="#C8F000">FC</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="500"
        text-anchor="middle" fill="#8e8e93" letter-spacing="1">
    Pronosticá. Competí. Ganá.
  </text>

  <!-- Divider -->
  <rect x="480" y="365" width="240" height="2" rx="1" fill="#C8F000" opacity="0.4"/>

  <!-- Competition label -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="24" font-weight="600"
        text-anchor="middle" fill="#C8F000" opacity="0.9">
    Champions League 2025/26 · Copa Mundial 2026
  </text>
</svg>
